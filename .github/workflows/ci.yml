name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs when a new commit is pushed to the same branch
# so we never waste minutes on superseded builds.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # Frontend — apps/web (Phase-14 R1 moved here from ./src)
  # ────────────────────────────────────────────────────────────────
  web:
    name: Web (vitest + vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck (tsc --noEmit)
        # Phase-14 R2: every .tsx still has @ts-nocheck at line 1, so
        # this should be clean today. As files lose their @ts-nocheck
        # in future PRs, typecheck will surface real errors and gate
        # the PR. Always run — never `continue-on-error` — once we're
        # off the @ts-nocheck escape hatch.
        run: npm run typecheck

      - name: Vitest
        run: npm test

      - name: Vite build
        run: npm run build
        env:
          # Match the production build flags the Dockerfile uses; this
          # catches any prod-only code path failure (PWA precache, SW
          # generation, etc.) before deploy time.
          NODE_ENV: production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: apps/web/dist
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # API (apps/api) — Jest + Prisma migration smoke against ephemeral pg.
  # ────────────────────────────────────────────────────────────────
  api:
    name: API (jest + prisma migrate smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        # Wait for postgres to accept connections before tests run.
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # The api workspace does not commit package-lock.json (legacy
      # decision; will revisit in P14 monorepo). So we use plain
      # `npm install` and skip the lockfile-keyed cache. The
      # ~/.npm directory is still cached automatically by setup-node.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        working-directory: apps/api
        run: npm install --no-audit --no-fund

      - name: Prisma generate
        working-directory: apps/api
        run: npx prisma generate

      - name: Prisma migrate (smoke against ephemeral pg)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
        run: npx prisma migrate deploy

      - name: Build (tsc)
        working-directory: apps/api
        run: npm run build

      - name: Jest
        working-directory: apps/api
        env:
          NODE_ENV: test
          CI: 'true'
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          JWT_SECRET: ci-test-jwt-secret-min-32-chars-ci-test-jwt-secret
          JWT_ACCESS_TTL: 15m
          JWT_REFRESH_TTL: 30d
          AI_GATEWAY_URL: http://localhost:9999
          AI_MODE: mock
          RUN_SEED: 'false'
          # Seed admin only consulted if RUN_SEED=true; required at boot
          # since R2b compose flips it to fail-closed.
          SEED_ADMIN_PASSWORD: ci-seed-admin-password-not-used
          AI_SERVICES_API_KEY: ci-ai-key-not-used
        # npm test in apps/api already passes --runInBand --forceExit
        run: npm test
