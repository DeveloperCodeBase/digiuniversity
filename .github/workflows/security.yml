name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily 07:15 UTC = 10:45 Tehran. Catches issues that surface after
    # CVE disclosure even when nobody touched the repo.
    - cron: '15 7 * * *'

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # for uploading SARIF to Security tab

jobs:
  # ────────────────────────────────────────────────────────────────
  # gitleaks — secret-scan diff + history.
  # ────────────────────────────────────────────────────────────────
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for diff-mode

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for org-level scanning.
          GITLEAKS_ENABLE_COMMENTS: 'true'

  # ────────────────────────────────────────────────────────────────
  # npm audit — both workspaces.
  # ────────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit (web + api)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: web
        # Run inside apps/web — the repo root has no package-lock.json
        # (monorepo: each workspace owns its lockfile), so a root-level
        # `npm audit` errored on "no lockfile" and only passed because of
        # continue-on-error. Pointing it at the real lockfile makes the
        # advisory meaningful.
        working-directory: apps/web
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true   # advisory only until we agree a policy

      - name: api
        working-directory: apps/api
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────
  # Trivy filesystem scan — picks up CVEs in lockfiles + dockerfiles.
  # ────────────────────────────────────────────────────────────────
  trivy-fs:
    name: trivy filesystem
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Trivy fs scan
        # The trivy-action release tags are v-prefixed (v0.28.0). The
        # bare `@0.28.0` ref doesn't exist → "Unable to resolve action"
        # broke the whole Security workflow. Pin to the valid v-tag.
        uses: aquasecurity/trivy-action@v0.28.0
        # This job is advisory (it uploads a SARIF report; it is NOT a
        # hard gate — see exit-code:'0' below). continue-on-error keeps a
        # future trivy hiccup (bad version, registry blip, scanner crash)
        # from failing the Security workflow + thereby blocking the
        # R-Infra auto-deploy gate (which requires Security green).
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          # Don't fail the job on findings — we want a SARIF report
          # in the Security tab without blocking PRs while we triage.
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        # if: always() so the report uploads even on prior-step issues.
        # continue-on-error so a missing/empty SARIF (if the scan step
        # was skipped/failed) doesn't fail the job either.
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

  # ────────────────────────────────────────────────────────────────
  # semgrep — OWASP top-10 / common-bug rule sets.
  # ────────────────────────────────────────────────────────────────
  semgrep:
    name: semgrep (OWASP rules)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run semgrep
        run: |
          semgrep --config=p/owasp-top-ten --sarif --output=semgrep.sarif . || true
          semgrep --config=p/javascript --sarif --output=semgrep-js.sarif . || true

      - name: Upload SARIF — OWASP top 10
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep-owasp

      - name: Upload SARIF — JavaScript
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-js.sarif
          category: semgrep-js
