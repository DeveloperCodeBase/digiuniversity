<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0d1a" />
  <meta name="description" content="دانشگاه آنلاین هوشمند مبتنی بر هوش مصنوعی — ۸ دانشکده، ۲۴۸ برنامه، گواهی قابل اثبات." />
  <title>دیجی‌یونیورسیتی — دانشگاه آنلاین هوشمند</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

  <!--
    Phase-15 R5: PWA recovery bootstrap moved out of the HTML so the
    site can ship a strict Content-Security-Policy without
    'unsafe-inline' in script-src. The script still loads from <head>
    (before the main module bundle) and runs synchronously, so the
    controllerchange listener and one-time stale-SW kill switch still
    fire pre-paint. Nginx serves /sw-recovery.js with no-cache so each
    deploy gets fresh logic. See apps/web/public/sw-recovery.js.
  -->
  <script src="/sw-recovery.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
