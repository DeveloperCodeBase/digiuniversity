<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0d1a" />
  <meta name="description" content="دانشگاه آنلاین هوشمند مبتنی بر هوش مصنوعی — ۸ دانشکده، ۲۴۸ برنامه، گواهی قابل اثبات." />
  <title>دیجی‌یونیورسیتی — دانشگاه آنلاین هوشمند</title>

  <!--
    Phase-A R7.2.c — Google Fonts <link> removed. Self-hosted via
    @fontsource/* imports in src/main.tsx (Q1 Option B1 per owner ack
    2026-05-24). This eliminates a ~199 KiB third-party transfer
    (Vazirmatn ×7 + Bricolage variable + JetBrains ×4) on every cold
    load — fonts now ship as same-origin woff2 with trimmed weights,
    counted in the Vite build's chunk graph (no extra TLS round-trip
    to fonts.gstatic.com).
  -->

  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

  <!--
    Phase-15 R5: PWA recovery bootstrap moved out of the HTML so the
    site can ship a strict Content-Security-Policy without
    'unsafe-inline' in script-src. The script still loads from <head>
    (before the main module bundle) and runs synchronously, so the
    controllerchange listener and one-time stale-SW kill switch still
    fire pre-paint. Nginx serves /sw-recovery.js with no-cache so each
    deploy gets fresh logic. See apps/web/public/sw-recovery.js.
  -->
  <script src="/sw-recovery.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
