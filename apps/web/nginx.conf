server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  digiuniversity.ir www.digiuniversity.ir _;

    root   /usr/share/nginx/html;
    index  index.html;

    charset utf-8;

    # We sit behind the host Caddy (which sits behind the CDN), so trust the
    # forwarded scheme for redirect/canonicalisation in the SPA if needed.
    real_ip_header     X-Forwarded-For;
    set_real_ip_from   172.16.0.0/12;
    set_real_ip_from   10.0.0.0/8;
    set_real_ip_from   192.168.0.0/16;

    # Security headers (defaults at server scope).
    #
    # nginx gotcha: `add_header` directives do NOT merge across scopes.
    # A child block (location) with *any* `add_header` REPLACES the
    # parent set entirely. So we re-declare the full security set
    # inside every location that already has its own add_header
    # (`/`, `/assets/`, the SW files, etc.) via the
    # `include` snippet below. Phase-11 added these at server scope
    # only; the SPA fallback at `/` never saw them because of the
    # inline `Cache-Control "no-cache"`.
    #
    # CSP intentionally deferred to a later phase-13 round — too-strict
    # CSP breaks SPA bootstrap + Sentry + future Stripe iframes. Needs
    # report-only soak first, then enforce.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # Gzip
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_comp_level    6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        font/woff2;

    # Healthcheck endpoint. Plain text "ok"; no security headers needed
    # (no auth context, no HTML, no JS), but we omit them rather than
    # inheriting them by accident: this is a probe URL.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Never cache the service worker or web manifest. Security headers
    # re-declared because each of these has its own add_header.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        try_files $uri =404;
    }
    location ~ ^/workbox-.*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        try_files $uri =404;
    }

    # Hashed Vite assets — immutable, long cache
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        try_files $uri =404;
    }

    # Other static assets
    location ~* \.(?:css|js|svg|woff2?|ttf|eot|ico|png|jpe?g|gif|webp|avif)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        try_files $uri =404;
    }

    # SPA fallback — index.html itself must not be cached. This is the
    # critical block for security headers because every page-navigation
    # response is served from here.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
    }

    # Don't serve dotfiles
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Tighter error handling
    error_page 404 /index.html;
}
