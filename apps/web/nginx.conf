server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  digiuniversity.ir www.digiuniversity.ir _;

    root   /usr/share/nginx/html;
    index  index.html;

    charset utf-8;

    # We sit behind the host Caddy (which sits behind the CDN), so trust the
    # forwarded scheme for redirect/canonicalisation in the SPA if needed.
    real_ip_header     X-Forwarded-For;
    set_real_ip_from   172.16.0.0/12;
    set_real_ip_from   10.0.0.0/8;
    set_real_ip_from   192.168.0.0/16;

    # Security headers (defaults at server scope) — see comment block at
    # the top of snippets/security-headers.conf for the rationale per
    # header. Re-included inside every location below because nginx's
    # add_header does not merge across scopes.
    include /etc/nginx/snippets/security-headers.conf;

    # Gzip
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_comp_level    6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        font/woff2;

    # Healthcheck endpoint. Plain text "ok"; we intentionally do NOT
    # `include` the security snippet here so the probe response stays
    # the bare minimum the upstream Caddy + remote.ps1 expect.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Phase-15 R5 — never cache the PWA recovery bootstrap, so a deploy
    # that changes the kill-flag or controllerchange behaviour reaches
    # all clients on the very next page load.
    location = /sw-recovery.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # Never cache the service worker or web manifest. Security headers
    # re-included because each of these has its own add_header.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }
    location ~ ^/workbox-.*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # Hashed Vite assets — immutable, long cache
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # Other static assets
    location ~* \.(?:css|js|svg|woff2?|ttf|eot|ico|png|jpe?g|gif|webp|avif)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # SPA fallback — index.html itself must not be cached. This is the
    # critical block for security headers because every page-navigation
    # response is served from here.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Don't serve dotfiles
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Tighter error handling
    error_page 404 /index.html;
}
