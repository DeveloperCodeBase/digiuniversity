# Single source of truth for response security headers on the web tier.
#
# nginx gotcha: `add_header` does NOT merge across scopes — a child block
# with *any* `add_header` REPLACES the parent's headers entirely. So every
# location that needs *any* custom header (caching, content-type, …) must
# `include` this file so the security set re-applies. The runtime layout
# copies this file to /etc/nginx/snippets/security-headers.conf during
# `docker build` (see apps/web/Dockerfile).
#
# Why these in particular:
#   - X-Content-Type-Options: stop MIME-sniff downgrades.
#   - X-Frame-Options:        legacy companion to CSP frame-ancestors.
#   - Referrer-Policy:        avoid leaking authed paths to third-party
#                             resources via Referer.
#   - Permissions-Policy:     deny risky platform APIs by default; the
#                             SPA opts in per-feature later.
#   - HSTS:                   force HTTPS at the browser even before
#                             the host Caddy redirects.
#   - COOP + CORP:            cross-origin isolation so future
#                             SharedArrayBuffer-backed features (e.g.
#                             WASM, large-payload assessments) can
#                             enable themselves.
#   - CSP (Report-Only):      Phase-15 R5 — soak first, enforce later.
#                             `script-src 'self'` plus the externalised
#                             /sw-recovery.js plus the Vite asset bundle
#                             from /assets/ should produce zero violation
#                             reports under steady state; the
#                             `Report-Only` mode means real users keep
#                             working while we monitor.
#
# The CSP allows:
#   - 'self' for everything that the SPA itself owns
#   - Google Fonts CSS at fonts.googleapis.com and binary fonts at
#     fonts.gstatic.com (the SPA preconnects to both — see index.html)
#   - 'unsafe-inline' for style-src only, because React's `style={{}}`
#     prop compiles to inline style attributes. CSS injection is rarely
#     RCE so this is a pragmatic trade-off and is industry-standard for
#     React apps without nonce injection.
#   - 'wasm-unsafe-eval' so libraries like KaTeX / TipTap math / future
#     pdf.js can run wasm without the legacy `'unsafe-eval'` keyword
#     re-enabling JS eval().
#   - data: for img-src + font-src — Vite inlines tiny SVG/data URIs.
#   - https: for img-src — public course art and avatars on a CDN.
#   - connect-src 'self' — the SPA talks to /v1/* on the same origin
#     through the host Caddy that fronts both the web container and the
#     api container.
#
# Once 7 days of Report-Only show zero violation reports for legitimate
# traffic, the next round will rename the header to `Content-Security-Policy`
# (drop `-Report-Only`) to actually enforce.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;
