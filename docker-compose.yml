name: digiuniversity

# All three app services share the `web` bridge network. The host Caddy
# (hooshgate_caddy on this VPS) joins this network too — see
# infra/Caddyfile.snippet and `scripts/remote.ps1 caddy-install`.

services:
  app:
    build:
      # Phase-14 R1: web sources moved from /src + root configs into
      # apps/web/. The Dockerfile + nginx.conf live alongside the
      # source now, so the build context narrows to that subdir. The
      # api + ai-gateway services already followed this convention.
      context: ./apps/web
      dockerfile: Dockerfile
    # Phase-13 R3: image tag is overridable via the IMAGE_TAG env var
    # so a future CI deploy pipeline can pin a SHA (digiuniversity:abc1234)
    # instead of mutable :latest. `remote.ps1 pin-image` retags the
    # current build with the active git SHA so `rollback -Sha <sha>`
    # can switch back without rebuilding.
    image: digiuniversity:${IMAGE_TAG:-latest}
    container_name: digiuniversity-app
    restart: unless-stopped
    # Phase-13 R5: no host port publication. The SPA is reachable
    # only via the digiuniversity_web docker network. The host Caddy
    # (hooshgate_caddy) joins that network via `caddy-install` and
    # proxies through to `digiuniversity-app:80`. Removing the host
    # port closes a defence-in-depth gap (no plain-HTTP listener
    # bypass-Caddy possible). To restore the escape hatch in an
    # emergency (Caddy is down), uncomment the ports block, run
    # `remote.ps1 up`, then revert when fixed.
    # ports:
    #   - "${APP_PORT:-8090}:80"
    expose:
      - "80"
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - web
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    container_name: digiuniversity-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-digiuniversity}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-digiuniversity_dev}
      - POSTGRES_DB=${POSTGRES_DB:-digiuniversity}
      - TZ=${TZ:-UTC}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-digiuniversity} -d ${POSTGRES_DB:-digiuniversity}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - web
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      # IMPORTANT: pin to the runtime stage. Without this, Docker uses
      # the LAST stage in the Dockerfile, which since Phase 10 is the
      # `test` stage — and the api service would silently boot into
      # `jest --runInBand`, exit clean when tests pass, and crash-loop.
      target: runtime
    image: digiuniversity-api:${IMAGE_TAG:-latest}
    container_name: digiuniversity-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-UTC}
      - PORT=4000
      - APP_VERSION=0.2.0
      - AI_GATEWAY_URL=http://ai-gateway:8000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-digiuniversity}:${POSTGRES_PASSWORD:-digiuniversity_dev}@postgres:5432/${POSTGRES_DB:-digiuniversity}?schema=public
      # Phase-13 R2b: hard-required secrets — no compose-time default.
      # Provided by /var/www/digiuniversity/.env on the VPS (generated by
      # scripts/remote.ps1 provision-env). A missing .env fails the api
      # boot fast instead of silently running with `change-me-*`.
      - JWT_SECRET=${JWT_SECRET:?missing-jwt-secret-run-provision-env}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL:-15m}
      - JWT_REFRESH_TTL=${JWT_REFRESH_TTL:-30d}
      # Phase-13 R2b: RUN_SEED is opt-in. Set explicitly to `true` in
      # .env or run `remote.ps1 seed` to bootstrap a fresh demo tenant.
      # Default false avoids clobbering live data on every recreate.
      - RUN_SEED=${RUN_SEED:-false}
      - SEED_TENANT_SLUG=${SEED_TENANT_SLUG:-demo}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@digiuniversity.ir}
      # SEED_ADMIN_PASSWORD only consulted when RUN_SEED=true; still
      # required hard so a fresh-VPS bootstrap can't be silent-defaulted.
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:?missing-seed-admin-password-run-provision-env}
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - web
    security_opt:
      - no-new-privileges:true

  ai-gateway:
    build:
      context: ./apps/ai-gateway
      dockerfile: Dockerfile
    image: digiuniversity-ai-gateway:${IMAGE_TAG:-latest}
    container_name: digiuniversity-ai-gateway
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      # Default to mock so the stack runs without external secrets.
      - AI_MODE=${AI_MODE:-mock}
      - AI_SERVICES_BASE_URL=${AI_SERVICES_BASE_URL:-https://future-gpu-server.example.com}
      # Phase-13 R2b: hard-required when AI_MODE != mock; still required
      # at compose-parse time so a missing .env fails closed.
      - AI_SERVICES_API_KEY=${AI_SERVICES_API_KEY:?missing-ai-services-api-key-run-provision-env}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-120}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - web
    security_opt:
      - no-new-privileges:true

  # Phase-16 — one-off visual evidence runner. Captures Playwright
  # screenshots of the live `app` nginx container at gate-specific
  # viewports. Opt-in via `--profile visual` so a normal `compose up`
  # never starts it. Used by `scripts/remote.ps1 visual -Service <gate>`.
  #
  # node_modules is persisted in a docker volume so subsequent runs are
  # fast (~5s start instead of ~45s npm install). To bust the cache,
  # `docker volume rm digiuniversity_web-visual-node-modules`.
  #
  # /screenshots is bind-mounted to ./docs on the host so each gate spec
  # can write directly into the repository under docs/<gate>-evidence/.
  web-visual:
    profiles: ["visual"]
    image: mcr.microsoft.com/playwright:v1.49.1-noble
    container_name: digiuniversity-web-visual
    working_dir: /work
    # No depends_on — visual tests target the live production URL by
    # default, so the local app container does not need to be up. If
    # you point PLAYWRIGHT_BASE_URL at http://app for staging tests,
    # `docker compose up -d app` first.
    environment:
      - CI=true
      # PLAYWRIGHT_BASE_URL is unset; the visual config defaults to
      # https://digiuniversity.ir (production). Override at run time
      # if you need to point at a staging environment.
      - NPM_CONFIG_FUND=false
      - NPM_CONFIG_AUDIT=false
    volumes:
      - ./apps/web:/work
      - web-visual-node-modules:/work/node_modules
      - web-visual-storybook-static:/work/storybook-static
      - ./docs:/screenshots
    networks:
      - web
    security_opt:
      - no-new-privileges:true
    # Default command — overridden per-invocation by remote.ps1 visual.
    command:
      - bash
      - -c
      - "npm install --no-audit --no-fund --silent && npx playwright test --config playwright.visual.config.js"

  # One-off test runner. Opt-in via `--profile test` so a normal
  # `docker compose up` never starts it. Reuses postgres + ai-gateway
  # so tests hit the real downstream services. Each spec creates its
  # own throwaway tenant slug so data never collides.
  api-test:
    profiles: ["test"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: test
    image: digiuniversity-api-test:latest
    depends_on:
      postgres:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    environment:
      - NODE_ENV=test
      - CI=true
      - TZ=${TZ:-UTC}
      - APP_VERSION=0.2.0
      - AI_GATEWAY_URL=http://ai-gateway:8000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-digiuniversity}:${POSTGRES_PASSWORD:-digiuniversity_dev}@postgres:5432/${POSTGRES_DB:-digiuniversity}?schema=public
      - JWT_SECRET=test-only-jwt-secret-min-32-chars-test-only-jwt
      - JWT_ACCESS_TTL=15m
      - JWT_REFRESH_TTL=30d
      - RUN_SEED=false
    networks:
      - web
    security_opt:
      - no-new-privileges:true

networks:
  web:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  # Phase-16 — persistent node_modules cache for the web-visual runner.
  # First run installs deps, subsequent runs reuse the volume so the
  # `remote.ps1 visual` round-trip stays under 30s.
  web-visual-node-modules:
    driver: local
  # Phase-16 R3 — cache the static Storybook build between runs so we
  # don't pay 30+ seconds rebuilding it every time we re-capture.
  # Invalidate with `docker volume rm digiuniversity_web-visual-storybook-static`.
  web-visual-storybook-static:
    driver: local
