name: digiuniversity

# All three app services share the `web` bridge network. The host Caddy
# (hooshgate_caddy on this VPS) joins this network too — see
# infra/Caddyfile.snippet and `scripts/remote.ps1 caddy-install`.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: digiuniversity:latest
    container_name: digiuniversity-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8090}:80"
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - web
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    container_name: digiuniversity-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-digiuniversity}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-digiuniversity_dev}
      - POSTGRES_DB=${POSTGRES_DB:-digiuniversity}
      - TZ=${TZ:-UTC}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-digiuniversity} -d ${POSTGRES_DB:-digiuniversity}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - web
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: digiuniversity-api:latest
    container_name: digiuniversity-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-UTC}
      - PORT=4000
      - APP_VERSION=0.2.0
      - AI_GATEWAY_URL=http://ai-gateway:8000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-digiuniversity}:${POSTGRES_PASSWORD:-digiuniversity_dev}@postgres:5432/${POSTGRES_DB:-digiuniversity}?schema=public
      - JWT_SECRET=${JWT_SECRET:-change-me-min-32-chars-change-me-min-32-chars}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL:-15m}
      - JWT_REFRESH_TTL=${JWT_REFRESH_TTL:-30d}
      - RUN_SEED=${RUN_SEED:-true}
      - SEED_TENANT_SLUG=${SEED_TENANT_SLUG:-demo}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@digiuniversity.ir}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-ChangeMe!2026}
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - web
    security_opt:
      - no-new-privileges:true

  ai-gateway:
    build:
      context: ./apps/ai-gateway
      dockerfile: Dockerfile
    image: digiuniversity-ai-gateway:latest
    container_name: digiuniversity-ai-gateway
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      # Default to mock so the stack runs without external secrets.
      - AI_MODE=${AI_MODE:-mock}
      - AI_SERVICES_BASE_URL=${AI_SERVICES_BASE_URL:-https://future-gpu-server.example.com}
      - AI_SERVICES_API_KEY=${AI_SERVICES_API_KEY:-change-me}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-120}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - web
    security_opt:
      - no-new-privileges:true

  # One-off test runner. Opt-in via `--profile test` so a normal
  # `docker compose up` never starts it. Reuses postgres + ai-gateway
  # so tests hit the real downstream services. Each spec creates its
  # own throwaway tenant slug so data never collides.
  api-test:
    profiles: ["test"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: test
    image: digiuniversity-api-test:latest
    depends_on:
      postgres:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    environment:
      - NODE_ENV=test
      - CI=true
      - TZ=${TZ:-UTC}
      - APP_VERSION=0.2.0
      - AI_GATEWAY_URL=http://ai-gateway:8000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-digiuniversity}:${POSTGRES_PASSWORD:-digiuniversity_dev}@postgres:5432/${POSTGRES_DB:-digiuniversity}?schema=public
      - JWT_SECRET=test-only-jwt-secret-min-32-chars-test-only-jwt
      - JWT_ACCESS_TTL=15m
      - JWT_REFRESH_TTL=30d
      - RUN_SEED=false
    networks:
      - web
    security_opt:
      - no-new-privileges:true

networks:
  web:
    driver: bridge

volumes:
  postgres-data:
    driver: local
