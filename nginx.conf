server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  digiuniversity.ir www.digiuniversity.ir _;

    root   /usr/share/nginx/html;
    index  index.html;

    charset utf-8;

    # We sit behind the host Caddy (which sits behind the CDN), so trust the
    # forwarded scheme for redirect/canonicalisation in the SPA if needed.
    real_ip_header     X-Forwarded-For;
    set_real_ip_from   172.16.0.0/12;
    set_real_ip_from   10.0.0.0/8;
    set_real_ip_from   192.168.0.0/16;

    # Security headers
    # We sit behind hooshgate_caddy which terminates TLS. HSTS only takes
    # effect over HTTPS but is harmless on the plain-HTTP listener — the
    # browser ignores it on non-secure connections. Setting it here keeps
    # the policy adjacent to the rest of the SPA's response headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    # Note: Content-Security-Policy intentionally deferred to a later
    # phase-13 round because a too-strict CSP breaks the SPA's inline
    # bootstrap + Sentry + future Stripe/payment iframes. It needs its
    # own deploy + smoke round with report-only first, then enforce.

    # Gzip
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_comp_level    6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        font/woff2;

    # Healthcheck endpoint
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Never cache the service worker or web manifest
    location = /sw.js                { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }
    location = /registerSW.js        { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }
    location = /workbox-*.js         { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }

    # Hashed Vite assets — immutable, long cache
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Other static assets
    location ~* \.(?:css|js|svg|woff2?|ttf|eot|ico|png|jpe?g|gif|webp|avif)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA fallback — index.html itself must not be cached
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Don't serve dotfiles
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Tighter error handling
    error_page 404 /index.html;
}
